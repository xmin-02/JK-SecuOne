<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 찾기 - JK SecuOne</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --secondary-color: #8b5cf6;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --bg-primary: #0f172a;
            --border-color: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --hover-bg: #2d3748;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 2rem;
        }

        .reset-box {
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 3rem;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
        }

        .reset-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .reset-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.1));
            border-radius: 50%;
            border: 2px solid rgba(99, 102, 241, 0.2);
        }

        .reset-icon svg {
            width: 40px;
            height: 40px;
            color: var(--primary-color);
        }

        .reset-header h1 {
            font-size: 1.875rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .reset-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .step-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .step-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--border-color);
            transition: all 0.3s;
        }

        .step-dot.active {
            background: linear-gradient(135deg, var(--primary-color), #8b5cf6);
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.5);
            width: 24px;
            border-radius: 5px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .form-input.success {
            border-color: #10b981;
        }

        .form-input.error {
            border-color: #ef4444;
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
        }

        .input-group .form-input {
            flex: 1;
        }

        .verify-btn {
            padding: 0.875rem 1.5rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .verify-btn:hover:not(:disabled) {
            background: #4f46e5;
        }

        .verify-btn:disabled {
            background: var(--border-color);
            cursor: not-allowed;
        }

        .verify-btn.success {
            background: #10b981;
        }

        .help-text {
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: block;
        }

        .help-text.success {
            color: #10b981;
        }

        .help-text.error {
            color: #ef4444;
        }

        .help-text.info {
            color: var(--text-secondary);
        }

        .verification-code-group {
            display: none;
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(99, 102, 241, 0.05);
            border-radius: 0.5rem;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .verification-code-group.show {
            display: block;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .submit-btn {
            width: 100%;
            padding: 1.125rem;
            background: linear-gradient(135deg, var(--primary-color), #8b5cf6);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(99, 102, 241, 0.5);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .back-link {
            text-align: center;
            margin-top: 2rem;
        }

        .back-link a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: var(--text-primary);
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--success-color);
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
            display: none;
        }

        .step-content {
            display: none;
        }

        .step-content.active {
            display: block;
        }

        /* 비밀번호 강도 표시 */
        .password-strength {
            margin-top: 0.75rem;
        }

        .strength-bars {
            display: flex;
            gap: 0.25rem;
            margin-bottom: 0.5rem;
        }

        .strength-bar {
            height: 4px;
            flex: 1;
            background: var(--border-color);
            border-radius: 2px;
            transition: all 0.3s;
        }

        .strength-bar.active {
            background: var(--danger-color);
        }

        .strength-bar.active.medium {
            background: var(--warning-color);
        }

        .strength-bar.active.strong {
            background: var(--success-color);
        }

        .strength-text {
            font-size: 0.85rem;
            font-weight: 500;
        }

        .strength-text.weak {
            color: var(--danger-color);
        }

        .strength-text.medium {
            color: var(--warning-color);
        }

        .strength-text.strong {
            color: var(--success-color);
        }

        .password-requirements {
            margin-top: 0.5rem;
            padding: 0.75rem;
            background: rgba(99, 102, 241, 0.05);
            border-radius: 0.5rem;
            border: 1px solid rgba(99, 102, 241, 0.1);
        }

        .requirement-item {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin: 0.25rem 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .requirement-item.met {
            color: var(--success-color);
        }

        .requirement-item svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="reset-box">
            <div class="reset-header">
                <div class="reset-icon">
                    <svg id="headerIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                </div>
                <h1>비밀번호 찾기</h1>
                <p id="headerText">가입 시 사용한 이메일 주소를 입력해주세요.</p>
            </div>

            <div class="step-indicator">
                <div class="step-dot active" id="step1Dot"></div>
                <div class="step-dot" id="step2Dot"></div>
            </div>

            <div class="success-message" id="successMessage"></div>

            <!-- Step 1: 이메일 확인 -->
            <div id="emailStep" class="step-content active">
                <form onsubmit="verifyEmail(event)">
                    <div class="form-group">
                        <label for="username" class="form-label">아이디</label>
                        <input 
                            type="text" 
                            id="username" 
                            class="form-input" 
                            placeholder="아이디를 입력하세요"
                            required
                        >
                        <p class="help-text info">가입 시 사용한 아이디를 입력해주세요.</p>
                    </div>
                    <div class="form-group">
                        <label for="email" class="form-label">이메일</label>
                        <div class="input-group">
                            <input 
                                type="email" 
                                id="email" 
                                class="form-input" 
                                placeholder="example@email.com"
                                required
                            >
                            <button type="button" class="verify-btn" id="sendCodeBtn" onclick="sendVerificationCode()">
                                인증
                            </button>
                        </div>
                        <p class="help-text info" id="emailHelpText">가입 시 사용한 이메일 주소를 입력해주세요.</p>
                        
                        <!-- 인증번호 입력란 (동적 생성) -->
                        <div class="verification-code-group" id="verificationCodeGroup">
                            <label class="form-label" for="verificationCode">
                                인증번호
                            </label>
                            <div class="input-group">
                                <input 
                                    type="text" 
                                    id="verificationCode" 
                                    class="form-input" 
                                    placeholder="6자리 인증번호"
                                    maxlength="6"
                                >
                                <button type="button" class="verify-btn" onclick="verifyCode()">
                                    확인
                                </button>
                            </div>
                            <p class="help-text info" id="codeHelpText">이메일로 전송된 인증번호를 입력해주세요.</p>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn" id="nextStepBtn" disabled>다음 단계</button>
                </form>
            </div>

            <!-- Step 2: 비밀번호 재설정 -->
            <div id="passwordStep" class="step-content">
                <form onsubmit="resetPassword(event)">
                    <div class="form-group">
                        <label for="newPassword" class="form-label">새 비밀번호</label>
                        <input 
                            type="password" 
                            id="newPassword" 
                            class="form-input" 
                            placeholder="••••••••"
                            oninput="checkPasswordStrength()"
                            required
                        >
                        <div class="password-strength" id="passwordStrength">
                            <div class="strength-bars">
                                <div class="strength-bar" id="bar1"></div>
                                <div class="strength-bar" id="bar2"></div>
                                <div class="strength-bar" id="bar3"></div>
                                <div class="strength-bar" id="bar4"></div>
                            </div>
                            <div class="strength-text" id="strengthText"></div>
                        </div>
                        <div class="password-requirements">
                            <div class="requirement-item" id="req-length">
                                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <circle cx="12" cy="12" r="10"/>
                                </svg>
                                최소 6자 이상
                            </div>
                            <div class="requirement-item" id="req-letter">
                                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <circle cx="12" cy="12" r="10"/>
                                </svg>
                                영문자 포함
                            </div>
                            <div class="requirement-item" id="req-number">
                                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <circle cx="12" cy="12" r="10"/>
                                </svg>
                                숫자 포함
                            </div>
                            <div class="requirement-item" id="req-special">
                                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <circle cx="12" cy="12" r="10"/>
                                </svg>
                                특수문자 포함 (권장)
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword" class="form-label">비밀번호 확인</label>
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            class="form-input" 
                            placeholder="••••••••"
                            required
                        >
                    </div>
                    <button type="submit" class="submit-btn">비밀번호 변경</button>
                </form>
            </div>

            <div class="back-link">
                <a href="/login">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    로그인으로 돌아가기
                </a>
            </div>
        </div>
    </div>

    <script>
        let verifiedEmail = null;
        let emailVerified = false;

        function checkPasswordStrength() {
            const password = document.getElementById('newPassword').value;
            const bars = [document.getElementById('bar1'), document.getElementById('bar2'), 
                         document.getElementById('bar3'), document.getElementById('bar4')];
            const strengthText = document.getElementById('strengthText');
            
            // 요구사항 체크
            const hasLength = password.length >= 6;
            const hasLetter = /[a-zA-Z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(password);
            
            // 요구사항 UI 업데이트
            updateRequirement('req-length', hasLength);
            updateRequirement('req-letter', hasLetter);
            updateRequirement('req-number', hasNumber);
            updateRequirement('req-special', hasSpecial);
            
            // 비밀번호 강도 계산
            let strength = 0;
            if (hasLength) strength++;
            if (hasLetter) strength++;
            if (hasNumber) strength++;
            if (hasSpecial) strength++;
            
            // 모든 바 초기화
            bars.forEach(bar => {
                bar.classList.remove('active', 'medium', 'strong');
            });
            
            // 강도에 따라 바 활성화
            if (password.length === 0) {
                strengthText.textContent = '';
                strengthText.className = 'strength-text';
            } else if (strength <= 1) {
                bars[0].classList.add('active');
                strengthText.textContent = '약함';
                strengthText.className = 'strength-text weak';
            } else if (strength === 2) {
                bars[0].classList.add('active');
                bars[1].classList.add('active', 'medium');
                strengthText.textContent = '보통';
                strengthText.className = 'strength-text medium';
            } else if (strength === 3) {
                bars[0].classList.add('active', 'medium');
                bars[1].classList.add('active', 'medium');
                bars[2].classList.add('active', 'medium');
                strengthText.textContent = '강함';
                strengthText.className = 'strength-text strong';
            } else {
                bars.forEach(bar => bar.classList.add('active', 'strong'));
                strengthText.textContent = '매우 강함';
                strengthText.className = 'strength-text strong';
            }
        }
        
        function updateRequirement(id, met) {
            const element = document.getElementById(id);
            if (met) {
                element.classList.add('met');
                element.querySelector('svg').innerHTML = '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>';
            } else {
                element.classList.remove('met');
                element.querySelector('svg').innerHTML = '<circle cx="12" cy="12" r="10"/>';
            }
        }

        async function sendVerificationCode() {
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const sendCodeBtn = document.getElementById('sendCodeBtn');
            const emailHelpText = document.getElementById('emailHelpText');
            
            if (!username) {
                emailHelpText.textContent = '아이디를 입력해주세요.';
                emailHelpText.className = 'help-text error';
                return;
            }

            if (!email) {
                emailHelpText.textContent = '이메일을 입력해주세요.';
                emailHelpText.className = 'help-text error';
                return;
            }

            // 이메일 형식 검증
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                emailHelpText.textContent = '올바른 이메일 형식이 아닙니다.';
                emailHelpText.className = 'help-text error';
                return;
            }

            sendCodeBtn.disabled = true;
            sendCodeBtn.textContent = '발송 중...';

            try {
                // 먼저 아이디와 이메일이 일치하는지 확인
                const checkResponse = await fetch('/api/auth/verify-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email })
                });

                if (!checkResponse.ok) {
                    const checkResult = await checkResponse.json();
                    emailHelpText.textContent = checkResult.detail || '등록되지 않은 이메일입니다.';
                    emailHelpText.className = 'help-text error';
                    sendCodeBtn.disabled = false;
                    sendCodeBtn.textContent = '인증';
                    return;
                }

                // 이메일이 등록되어 있으면 인증번호 발송
                const response = await fetch('/api/auth/send-verification', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const result = await response.json();

                if (response.ok) {
                    emailHelpText.textContent = '인증번호가 이메일로 발송되었습니다. (유효시간: 10분)';
                    emailHelpText.className = 'help-text success';
                    
                    // 인증번호 입력란 표시
                    document.getElementById('verificationCodeGroup').classList.add('show');
                    
                    // 아이디와 이메일 입력란 비활성화
                    document.getElementById('username').disabled = true;
                    document.getElementById('email').disabled = true;
                    
                    sendCodeBtn.textContent = '재발송';
                    sendCodeBtn.disabled = false;
                } else {
                    emailHelpText.textContent = result.detail || '인증번호 발송에 실패했습니다.';
                    emailHelpText.className = 'help-text error';
                    sendCodeBtn.disabled = false;
                    sendCodeBtn.textContent = '인증';
                }
            } catch (error) {
                console.error('인증번호 발송 오류:', error);
                emailHelpText.textContent = '서버 오류가 발생했습니다.';
                emailHelpText.className = 'help-text error';
                sendCodeBtn.disabled = false;
                sendCodeBtn.textContent = '인증';
            }
        }

        async function verifyCode() {
            const email = document.getElementById('email').value;
            const code = document.getElementById('verificationCode').value;
            const codeHelpText = document.getElementById('codeHelpText');
            const verifyBtn = event.target;

            if (!code) {
                codeHelpText.textContent = '인증번호를 입력해주세요.';
                codeHelpText.className = 'help-text error';
                return;
            }

            if (code.length !== 6) {
                codeHelpText.textContent = '인증번호는 6자리입니다.';
                codeHelpText.className = 'help-text error';
                return;
            }

            verifyBtn.disabled = true;
            verifyBtn.textContent = '확인 중...';

            try {
                const response = await fetch('/api/auth/verify-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code })
                });

                const result = await response.json();

                if (response.ok) {
                    codeHelpText.textContent = '✓ 이메일 인증이 완료되었습니다.';
                    codeHelpText.className = 'help-text success';
                    
                    // 인증 완료 표시
                    document.getElementById('verificationCode').classList.add('success');
                    document.getElementById('verificationCode').disabled = true;
                    verifyBtn.textContent = '인증완료';
                    verifyBtn.classList.add('success');
                    
                    // 이메일 인증 완료
                    emailVerified = true;
                    verifiedEmail = email;
                    
                    // 다음 단계 버튼 활성화
                    document.getElementById('nextStepBtn').disabled = false;
                } else {
                    codeHelpText.textContent = result.detail || '인증번호가 일치하지 않습니다.';
                    codeHelpText.className = 'help-text error';
                    verifyBtn.disabled = false;
                    verifyBtn.textContent = '확인';
                }
            } catch (error) {
                console.error('인증번호 확인 오류:', error);
                codeHelpText.textContent = '서버 오류가 발생했습니다.';
                codeHelpText.className = 'help-text error';
                verifyBtn.disabled = false;
                verifyBtn.textContent = '확인';
            }
        }

        async function verifyEmail(event) {
            event.preventDefault();
            
            if (!emailVerified) {
                alert('이메일 인증을 완료해주세요.');
                return;
            }

            // Step 2로 전환
            document.getElementById('emailStep').classList.remove('active');
            document.getElementById('passwordStep').classList.add('active');
            
            // 단계 표시 업데이트
            document.getElementById('step1Dot').classList.remove('active');
            document.getElementById('step2Dot').classList.add('active');
            
            // 헤더 업데이트
            document.getElementById('headerText').textContent = '새로운 비밀번호를 입력해주세요. 최소 6자 이상으로 설정해주세요.';
            document.getElementById('headerIcon').innerHTML = '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>';
        }

        async function resetPassword(event) {
            event.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = event.target.querySelector('button[type="submit"]');

            if (newPassword !== confirmPassword) {
                alert('비밀번호가 일치하지 않습니다.');
                return;
            }

            if (newPassword.length < 6) {
                alert('비밀번호는 최소 6자 이상이어야 합니다.');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '변경 중...';

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: verifiedEmail, 
                        new_password: newPassword 
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    const successMsg = document.getElementById('successMessage');
                    successMsg.textContent = '비밀번호가 성공적으로 변경되었습니다. 잠시 후 로그인 페이지로 이동합니다.';
                    successMsg.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    alert(result.detail || '비밀번호 변경에 실패했습니다.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = '비밀번호 변경';
                }
            } catch (error) {
                console.error('비밀번호 변경 오류:', error);
                alert('서버 오류가 발생했습니다.');
                submitBtn.disabled = false;
                submitBtn.textContent = '비밀번호 변경';
            }
        }
    </script>
</body>
